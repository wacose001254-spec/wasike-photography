<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasike Photography | Nairobi's Visual Storyteller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">WASIKE<span>PHOTO</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="booking.html" class="cta-btn">Book Now</a>
        </div>
    </nav>

    <header class="hero">
        <div class="video-container">
            <video autoplay muted loop playsinline class="bg-video">
                <source src="assets/videos/hero-video.mp4" type="video/mp4">
            </video>
        </div>
        <div class="hero-overlay">
            <h1 class="reveal-text">Wasike Photography</h1>
            <p>Street • Portrait • Cinematic</p>
        </div>
    </header>

    <section class="recent-work">
        <div class="section-title">
            <h2>The Gallery</h2>
            <div class="line"></div>
        </div>
        <div class="portfolio-grid" id="main-gallery">
            <div class="photo-item"><img src="assets/images/sample1.jpg" alt="Work"></div>
            <div class="photo-item tall"><img src="assets/images/sample2.jpg" alt="Work"></div>
            <div class="photo-item"><img src="assets/images/sample3.jpg" alt="Work"></div>
            <div class="photo-item"><img src="assets/images/sample4.jpg" alt="Work"></div>
        </div>
    </section>

    <section class="social-shuffle">
        <div class="section-title">
            <h2>Live Feed</h2>
            <p>Updates from TikTok & Instagram</p>
        </div>
        <div class="social-container">
            <ul class="juicer-feed" data-feed-id="wasikephotography" data-per="8" data-columns="4">
                <h1 class="referral"><a href="https://www.juicer.io">Powered by Juicer</a></h1>
            </ul>
            <script type="text/javascript" src="https://www.juicer.io/embed/wasikephotography/embed-code.js" async defer></script>
        </div>
    </section>

    <footer class="footer">
        <div class="social-icons">
            <a href="https://tiktok.com/@wasikephotography"><i data-lucide="music"></i></a>
            <a href="https://instagram.com/wasikephotography"><i data-lucide="instagram"></i></a>
        </div>
        <p>&copy; 2026 Wasike Photography. Built for the Empire.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
