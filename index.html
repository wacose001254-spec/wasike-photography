<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasike Photography | Afro-Cinematic Visuals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="luxury-nav">
        <div class="logo">WASIKE<span>.</span></div>
        <div class="nav-links">
            <a href="portfolio.html">Works</a>
            <a href="about.html">The Story</a>
            <a href="booking.html" class="cta-gold">Commission Me</a>
        </div>
    </nav>

    <section class="hero-split">
        <div class="hero-video-aside">
            <video autoplay muted loop playsinline>
                <source src="assets/videos/hero-video.mp4" type="video/mp4">
            </video>
        </div>
        <div class="hero-text-center">
            <h1 class="reveal-text">Afro<br>Futurism</h1>
            <p class="subtitle">Visual Storytelling through the Kenyan Lens</p>
            <div class="scroll-indicator"></div>
        </div>
    </section>

    <section class="genre-grid">
        <div class="genre-box portraits" onclick="location.href='portfolio.html'">
            <div class="genre-overlay"><h3>Portraits</h3></div>
        </div>
        <div class="genre-box cinematic" onclick="location.href='portfolio.html'">
            <div class="genre-overlay"><h3>Cinematic</h3></div>
        </div>
        <div class="genre-box events" onclick="location.href='portfolio.html'">
            <div class="genre-overlay"><h3>Events</h3></div>
        </div>
    </section>

    <section class="social-section">
        <div class="section-label"><span>Social Feed</span></div>
        <div class="social-container">
            <ul class="juicer-feed" data-feed-id="wasikephotography" data-per="8" data-columns="4"></ul>
            <script type="text/javascript" src="https://www.juicer.io/embed/wasikephotography/embed-code.js" async defer></script>
        </div>
    </section>

    <footer class="luxury-footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>Nairobi, Kenya</h4>
                <p>Available for Worldwide Commission</p>
            </div>
            <div class="footer-col">
                <a href="https://instagram.com/wasikephotography">Instagram</a>
                <a href="https://tiktok.com/@wasikephotography">TikTok</a>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
