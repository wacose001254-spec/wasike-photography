<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasike Photography | Visual Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="mutua-nav">
        <div class="nav-content">
            <a href="index.html" class="logo">WASIKE<span>.</span></a>
            <div class="links">
                <a href="portfolio.html">Works</a>
                <a href="about.html">About</a>
                <a href="booking.html">Contact</a>
            </div>
        </div>
    </nav>

    <header class="fullscreen-hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/videos/hero-video.mp4" type="video/mp4">
        </video>
        <div class="hero-text">
            <span class="location-tag">Nairobi, Kenya</span>
            <h1>Capturing the <i>Essence</i> <br>of the City</h1>
        </div>
    </header>

    <main class="story-container">
        
        <section class="story-block">
            <div class="story-image">
                <img src="assets/images/nairobi-main.jpg" alt="Nairobi Skyline">
            </div>
            <div class="story-info">
                <h2>Nairobi</h2>
                <p>Architectural & Urban Narrative</p>
            </div>
        </section>

        <section class="story-block reverse">
            <div class="story-image">
                <img src="assets/images/portrait-main.jpg" alt="Portrait Work">
            </div>
            <div class="story-info">
                <h2>The People</h2>
                <p>Identity & Human Connection</p>
            </div>
        </section>

        <section class="story-block">
            <div class="story-image">
                <img src="assets/images/landscape-main.jpg" alt="Kenya Landscape">
            </div>
            <div class="story-info">
                <h2>Beyond</h2>
                <p>Exploring the Kenyan Horizon</p>
            </div>
        </section>

    </main>

    <footer class="minimal-footer">
        <p>&copy; 2026 Wasike Photography. Available for Commission.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
