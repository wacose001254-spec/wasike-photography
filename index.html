<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasike Photography | Visual Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="brand">WASIKE<span>.</span></a>
            <div class="nav-links">
                <a href="portfolio.html">Portfolio</a>
                <a href="about.html">Studio</a>
                <a href="booking.html" class="contact-trigger">Contact</a>
            </div>
        </div>
    </nav>

    <section class="fullscreen-hero">
        <video autoplay muted loop playsinline class="hero-media">
            <source src="assets/videos/hero-video.mp4" type="video/mp4">
        </video>
        <div class="hero-caption">
            <span class="location">Nairobi, Kenya</span>
            <h1>Capturing the <br><i>Unseen</i></h1>
        </div>
    </section>

    <section class="work-showcase">
        <div class="work-item">
            <img src="assets/images/sample1.jpg" alt="Commercial">
            <div class="item-meta"><h3>Brand Identity</h3></div>
        </div>
        <div class="work-item">
            <img src="assets/images/sample2.jpg" alt="Portrait">
            <div class="item-meta"><h3>Human Essence</h3></div>
        </div>
        <div class="work-item">
            <img src="assets/images/sample3.jpg" alt="Urban">
            <div class="item-meta"><h3>City Soul</h3></div>
        </div>
    </section>

    <section class="social-stream">
        <div class="stream-header">
            <h2>Live from @wasikephotography</h2>
        </div>
        <div class="juicer-wrapper">
             <ul class="juicer-feed" data-feed-id="wasikephotography" data-per="4" data-columns="4">
                <h1 class="referral"><a href="https://www.juicer.io">Powered by Juicer</a></h1>
             </ul>
             <script type="text/javascript" src="https://www.juicer.io/embed/wasikephotography/embed-code.js" async defer></script>
        </div>
    </section>

    <footer class="minimal-footer">
        <p>&copy; 2026 Wasike Photography. Nairobi.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
