<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Denis Wasike</title>
    <link href="https://fonts.googleapis.com/css2?family=Allison&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="sub-page">

    <nav class="mutua-navbar">
        <div class="nav-wrapper">
            <div class="nav-side left">
                <ul class="nav-menu">
                    <li><a href="portfolio.html">TRAVEL</a></li>
                    <li><a href="architecture.html">ARCH</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <a href="index.html" class="nav-brand-signature">Denis Wasike</a>
            </div>
            <div class="nav-side right">
                <ul class="nav-menu">
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="booking.html" class="shop-link">SOKO</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="contact-container">
        <div class="contact-header">
            <p class="pre-title">Get in Touch</p>
            <h1>Let's <i>Connect</i></h1>
        </div>

        <div class="contact-grid">
            <div class="contact-form-wrapper">
                <form action="#" class="matheka-form">
                    <div class="input-group">
                        <label>NAME *</label>
                        <input type="text" required>
                    </div>
                    <div class="input-group">
                        <label>EMAIL *</label>
                        <input type="email" required>
                    </div>
                    <div class="input-group">
                        <label>SUBJECT</label>
                        <input type="text">
                    </div>
                    <div class="input-group">
                        <label>MESSAGE *</label>
                        <textarea rows="6" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">SEND MESSAGE</button>
                </form>
            </div>

            <div class="contact-details">
                <div class="detail-item">
                    <h3>Inquiries</h3>
                    <p>info@wasikephotography.com</p>
                </div>
                <div class="detail-item">
                    <h3>Location</h3>
                    <p>Nairobi, Kenya<br>Available Worldwide</p>
                </div>
                <div class="detail-item">
                    <h3>Hours</h3>
                    <p>Mon — Fri: 08:00 - 17:00</p>
                </div>
                <div class="detail-socials">
                    <a href="https://instagram.com/wasikephotography">INSTAGRAM</a>
                    <a href="https://twitter.com/wasikephoto">TWITTER</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="mutua-footer">
        <p>&copy; 2026 Wasike Photography. Built for the Empire.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
