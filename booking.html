<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Wasike Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">

    <nav class="mutua-nav sticky-dark">
        <div class="nav-content">
            <a href="index.html" class="logo dark-text">WASIKE<span>.</span></a>
            <div class="links dark-links"><a href="portfolio.html">Works</a><a href="about.html">About</a></div>
        </div>
    </nav>

    <section class="booking-minimal">
        <div class="booking-header">
            <h2>Let's <i>Connect</i></h2>
            <p>For inquiries, commissions, or collaborations.</p>
        </div>

        <form class="minimal-form" id="contact-form">
            <div class="form-row">
                <input type="text" placeholder="NAME" required>
                <input type="email" placeholder="EMAIL" required>
            </div>
            <input type="text" placeholder="SUBJECT">
            <textarea placeholder="HOW CAN I HELP YOU?" rows="5"></textarea>
            <button type="submit" class="send-btn">Send Inquiry</button>
        </form>

        <div class="direct-contact">
            <p>Email: <a href="mailto:info@wasikephotography.com">info@wasikephotography.com</a></p>
            <p>Nairobi, Kenya</p>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
