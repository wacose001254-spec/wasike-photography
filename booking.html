<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session | Wasike Photography</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">WASIKE<span>PHOTO</span></div>
        <div class="nav-links"><a href="index.html">Home</a></div>
    </nav>

    <section class="booking-section">
        <div class="booking-form">
            <h2>Secure Your Date</h2>
            <form id="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Email Address" required>
                <select>
                    <option>Portrait Session</option>
                    <option>Commercial/Brand</option>
                    <option>Cinematic Video</option>
                </select>
                <textarea placeholder="Tell me about your vision..."></textarea>
                <button type="submit" class="submit-btn">Send Request</button>
            </form>
        </div>

        <div class="contact-info">
            <h3>Let's Connect</h3>
            <div class="social-links-large">
                <a href="https://tiktok.com/@wasikephotography"><i data-lucide="music"></i> TikTok</a>
                <a href="https://instagram.com/wasikephotography"><i data-lucide="instagram"></i> Instagram</a>
            </div>
            <p>Nairobi, Kenya</p>
        </div>
    </section>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
